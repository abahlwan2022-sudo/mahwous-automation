[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "streamlit run app.py --server.port=8080 --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false"
restartPolicyType = "ON_FAILURE"
numReplicas = 1

[service]
# This tells Railway to route traffic to port 8080
tcpProxyPort = 8080
